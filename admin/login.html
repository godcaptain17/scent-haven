<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Admin Login — Scent Haven</title>
  <link rel="stylesheet" href="../assets/css/core.css">
  <link rel="stylesheet" href="../assets/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="../assets/js/supabase.js"></script>
  <script src="../assets/js/db.js"></script>
  <script src="../assets/js/ui.js"></script>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/index.html"><img src="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png" alt="Scent Haven" style="height:56px;width:auto;display:block;margin:0 auto 0.5rem;"></a></div>
      <div style="text-align:center;margin-bottom:1rem;">
        <span class="badge badge-outline" style="font-size:0.56rem;">🔒 Admin Access</span>
      </div>
      <h1 class="auth-title">Admin Panel</h1>
      <p class="auth-subtitle">Restricted access — administrators only</p>

      <div class="form-group">
        <label class="form-label">Admin Email</label>
        <input type="email" class="form-input" id="admin-email" placeholder="admin@scenthaven.com" value="admin@scenthaven.com">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="admin-password" placeholder="Enter admin password">
      </div>

      <button class="btn btn-primary btn-block" id="admin-login-btn" onclick="handleAdminLogin()">Access Dashboard</button>

      <div class="auth-footer">
        <a href="/index.html" style="color:var(--muted);">← Back to website</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('admin-password').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleAdminLogin();
    });

    document.addEventListener('DOMContentLoaded', async () => {
      // If already admin, redirect
      const isAdmin = await Auth.isAdmin();
      if (isAdmin) window.location.href = '/admin/dashboard.html';
    });

    async function handleAdminLogin() {
      const email = document.getElementById('admin-email').value.trim();
      const password = document.getElementById('admin-password').value;

      if (!email || !password) {
        showToast('Please fill in all fields', 'error');
        return;
      }

      const btn = document.getElementById('admin-login-btn');
      btn.textContent = 'Authenticating...';
      btn.disabled = true;

      const { data, error } = await Auth.login(email, password);
      if (error) {
        showToast('Authentication failed', 'error');
        btn.textContent = 'Access Dashboard';
        btn.disabled = false;
        return;
      }

      // Verify admin role
      const isAdmin = await Auth.isAdmin();
      if (!isAdmin) {
        showToast('Access denied. You are not an administrator.', 'error');
        await Auth.logout();
        btn.textContent = 'Access Dashboard';
        btn.disabled = false;
        return;
      }

      showToast('Welcome, Admin!', 'success');
      setTimeout(() => { window.location.href = '/admin/dashboard.html'; }, 500);
    }
  </script>
</body>
</html>
