<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Register — Scent Haven</title>
  <link rel="stylesheet" href="/assets/css/core.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/db.js"></script>
  <script src="/assets/js/ui.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C9A84C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scent Haven">
  <link rel="apple-touch-icon" href="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png">
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/index.html"><img src="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png" alt="Scent Haven" style="height:120px;width:auto;display:block;margin:0 auto 0.5rem;"></a></div>
      <h1 class="auth-title">Create Account</h1>
      <p class="auth-subtitle">Join the Scent Haven community</p>

      <div class="form-group">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-input" id="reg-name" placeholder="John Doe" autocomplete="name">
      </div>
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <input type="email" class="form-input" id="reg-email" placeholder="your@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" class="form-input" id="reg-password" placeholder="Min. 6 characters" autocomplete="new-password">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="reg-confirm" placeholder="Re-enter password">
      </div>

      <button class="btn btn-primary btn-block" id="reg-btn" onclick="handleRegister()">Create Account</button>

      <div class="auth-footer">
        Already have an account? <a href="/login.html">Sign in</a>
      </div>
    </div>
  </div>

  <script>
    document.getElementById('reg-confirm').addEventListener('keypress', (e) => {
      if (e.key === 'Enter') handleRegister();
    });

    async function handleRegister() {
      const name = document.getElementById('reg-name').value.trim();
      const email = document.getElementById('reg-email').value.trim();
      const password = document.getElementById('reg-password').value;
      const confirm = document.getElementById('reg-confirm').value;

      if (!name) { showToast('Please enter your name', 'error'); return; }
      if (!email) { showToast('Please enter your email', 'error'); return; }
      if (password.length < 6) { showToast('Password must be at least 6 characters', 'error'); return; }
      if (password !== confirm) { showToast('Passwords do not match', 'error'); return; }

      const btn = document.getElementById('reg-btn');
      btn.textContent = 'Creating account...';
      btn.disabled = true;

      const { data, error } = await Auth.register(email, password, name);
      if (error) {
        showToast(error.message || 'Registration failed', 'error');
        btn.textContent = 'Create Account';
        btn.disabled = false;
        return;
      }

      showToast('Account created successfully!', 'success');
      setTimeout(() => { window.location.href = '/profile.html'; }, 800);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
