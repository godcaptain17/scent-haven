<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Login — Scent Haven</title>
  <link rel="stylesheet" href="/assets/css/core.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/db.js"></script>
  <script src="/assets/js/ui.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C9A84C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scent Haven">
  <link rel="apple-touch-icon" href="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png">
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo"><a href="/index.html"><img src="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png" alt="Scent Haven" style="height:120px;width:auto;display:block;margin:0 auto 0.5rem;"></a></div>
      <h1 class="auth-title">Welcome Back</h1>
      <p class="auth-subtitle">Sign in to your account</p>

      <!-- Login Form -->
      <div id="login-form">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="login-email" placeholder="your@email.com" autocomplete="email">
          <div class="form-error" id="email-error"></div>
        </div>
        <div class="form-group">
          <label class="form-label">Password</label>
          <input type="password" class="form-input" id="login-password" placeholder="Enter your password" autocomplete="current-password">
          <div class="form-error" id="password-error"></div>
        </div>
        <div style="text-align:right;margin-bottom:1.2rem;">
          <a href="#" onclick="showForgotPassword()" style="font-size:0.72rem;color:var(--gold);">Forgot password?</a>
        </div>
        <button class="btn btn-primary btn-block" id="login-btn" onclick="handleLogin()">Sign In</button>
      </div>

      <!-- Forgot Password Form -->
      <div id="forgot-form" style="display:none;">
        <div class="form-group">
          <label class="form-label">Email Address</label>
          <input type="email" class="form-input" id="forgot-email" placeholder="your@email.com">
        </div>
        <button class="btn btn-primary btn-block" onclick="handleForgotPassword()">Send Reset Link</button>
        <div style="text-align:center;margin-top:1rem;">
          <a href="#" onclick="showLoginForm()" style="font-size:0.72rem;color:var(--gold);">← Back to login</a>
        </div>
      </div>

      <div class="auth-footer">
        Don't have an account? <a href="/register.html">Create one</a>
      </div>
    </div>
  </div>

  <script>
    document.addEventListener('DOMContentLoaded', () => {
      // Enter key support
      document.getElementById('login-password').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') handleLogin();
      });
    });

    function showForgotPassword() {
      document.getElementById('login-form').style.display = 'none';
      document.getElementById('forgot-form').style.display = 'block';
    }

    function showLoginForm() {
      document.getElementById('login-form').style.display = 'block';
      document.getElementById('forgot-form').style.display = 'none';
    }

    async function handleLogin() {
      const email = document.getElementById('login-email').value.trim();
      const password = document.getElementById('login-password').value;

      // Validate
      let valid = true;
      if (!email) {
        showFieldError('email-error', 'Email is required');
        valid = false;
      }
      if (!password) {
        showFieldError('password-error', 'Password is required');
        valid = false;
      }
      if (!valid) return;

      const btn = document.getElementById('login-btn');
      btn.textContent = 'Signing in...';
      btn.disabled = true;

      const { data, error } = await Auth.login(email, password);
      if (error) {
        showToast(error.message || 'Invalid credentials', 'error');
        btn.textContent = 'Sign In';
        btn.disabled = false;
        return;
      }

      showToast('Welcome back!', 'success');

      // Check if admin and redirect accordingly
      const isAdmin = await Auth.isAdmin();
      setTimeout(() => {
        if (isAdmin) {
          window.location.href = '/admin/dashboard.html';
        } else {
          window.location.href = '/index.html';
        }
      }, 500);
    }

    async function handleForgotPassword() {
      const email = document.getElementById('forgot-email').value.trim();
      if (!email) {
        showToast('Please enter your email', 'error');
        return;
      }
      const { error } = await Auth.resetPassword(email);
      if (error) {
        showToast(error.message, 'error');
        return;
      }
      showToast('Password reset link sent! Check your email.', 'success');
      showLoginForm();
    }

    function showFieldError(id, msg) {
      const el = document.getElementById(id);
      el.textContent = msg;
      el.style.display = 'block';
      el.parentElement.classList.add('error');
      setTimeout(() => {
        el.style.display = 'none';
        el.parentElement.classList.remove('error');
      }, 3000);
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
