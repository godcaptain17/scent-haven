<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — Scent Haven</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/assets/css/core.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
</head>
<body>
  <canvas id="particles-canvas"></canvas>

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-logo">
        <a href="/index.html">
          <img src="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png" alt="Scent Haven" style="height:80px;width:auto;display:block;margin:0 auto 0.5rem;">
        </a>
      </div>

      <h1 class="auth-title">Reset Password</h1>
      <p class="auth-subtitle">Enter your new password below</p>

      <div class="form-group">
        <label class="form-label">New Password</label>
        <input type="password" class="form-input" id="new-password" placeholder="Min. 6 characters">
      </div>
      <div class="form-group">
        <label class="form-label">Confirm Password</label>
        <input type="password" class="form-input" id="confirm-password" placeholder="Re-enter new password">
      </div>

      <button class="btn btn-primary btn-block" onclick="handleReset()">Update Password</button>
      <div id="status-msg" style="text-align:center;margin-top:1rem;font-size:0.85rem;color:var(--muted);"></div>

      <div class="auth-footer">
        <a href="/login.html">← Back to login</a>
      </div>
    </div>
  </div>

  <script src="/assets/js/ui.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', async () => {
      initParticles();

      // Supabase handles the token from the URL hash automatically
      // We just need to wait for the session to be set
      supabaseClient.auth.onAuthStateChange(async (event, session) => {
        if (event === 'PASSWORD_RECOVERY') {
          document.getElementById('status-msg').textContent = 'You can now set your new password.';
        }
      });
    });

    async function handleReset() {
      var newPass = document.getElementById('new-password').value;
      var confirmPass = document.getElementById('confirm-password').value;
      var msg = document.getElementById('status-msg');

      if (!newPass || newPass.length < 6) {
        msg.textContent = 'Password must be at least 6 characters.';
        msg.style.color = '#E05C5C';
        return;
      }
      if (newPass !== confirmPass) {
        msg.textContent = 'Passwords do not match.';
        msg.style.color = '#E05C5C';
        return;
      }

      msg.textContent = 'Updating...';
      msg.style.color = 'var(--muted)';

      var { error } = await supabaseClient.auth.updateUser({ password: newPass });

      if (error) {
        msg.textContent = 'Error: ' + error.message;
        msg.style.color = '#E05C5C';
      } else {
        msg.textContent = 'Password updated! Redirecting to login...';
        msg.style.color = '#6EC87A';
        setTimeout(() => { window.location.href = '/login.html'; }, 2000);
      }
    }
  </script>
</body>
</html>
