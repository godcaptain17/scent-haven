<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Shop — Scent Haven</title>
  <link rel="stylesheet" href="/assets/css/core.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/db.js"></script>
  <script src="/assets/js/ui.js?v=99"></script>
</head>
<body>
  <div class="loading-overlay" id="loading-screen">
    <div class="spinner" style="width:36px;height:36px;border-width:2.5px;"></div>
    <div class="loading-logo"><img src="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png" alt="Scent Haven" style="height:60px;width:auto;"></div>
  </div>
  <canvas id="particles-canvas"></canvas>
  <nav class="navbar" id="navbar"></nav>

  <div class="page-body">
    <div class="page-hero">
      <span class="section-eyebrow">✦ Our Collection</span>
      <h1 class="section-title">The <em>Shop</em></h1>
      <p class="body-text">Explore our curated selection of luxury fragrances</p>
    </div>

    <div class="container">
      <!-- Controls -->
      <div class="shop-controls">
        <div class="shop-search">
          <input type="text" id="search-input" placeholder="Search perfumes, brands, notes...">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
        </div>
        <div class="shop-filters" id="category-filters">
          <!-- Built by JS -->
        </div>
        <div class="shop-sort">
          <select id="sort-select">
            <option value="">Sort By</option>
            <option value="price_asc">Price: Low → High</option>
            <option value="price_desc">Price: High → Low</option>
            <option value="name">Name A–Z</option>
            <option value="rating">Top Rated</option>
          </select>
        </div>
      </div>

      <div class="products-count" id="products-count"></div>

      <!-- Products Grid -->
      <div class="products-grid" id="products-grid">
        <!-- Populated by JS -->
      </div>

      <!-- Empty State -->
      <div class="empty-state" id="no-results" style="display:none;">
        <div class="empty-state-icon">🔍</div>
        <div class="empty-state-title">No fragrances found</div>
        <div class="empty-state-text">Try adjusting your search or filters</div>
        <button class="btn btn-outline" onclick="clearFilters()">Clear Filters</button>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script>
    let currentCategory = 'All';
    let currentSearch = '';
    let currentSort = '';

    document.addEventListener('DOMContentLoaded', async () => {
      await renderNavbar('shop');

      // Check URL params for category
      const params = new URLSearchParams(window.location.search);
      if (params.get('category')) currentCategory = params.get('category');

      // Build category filters
      const filtersContainer = document.getElementById('category-filters');
      filtersContainer.innerHTML = CATEGORIES.map(cat =>
        `<button class="filter-btn ${cat === currentCategory ? 'active' : ''}" onclick="setCategory('${cat}')">${cat}</button>`
      ).join('');

      // Search input
      let searchTimeout;
      document.getElementById('search-input').addEventListener('input', (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
          currentSearch = e.target.value.trim();
          loadProducts();
        }, 300);
      });

      // Sort select
      document.getElementById('sort-select').addEventListener('change', (e) => {
        currentSort = e.target.value;
        loadProducts();
      });

      await loadProducts();
    });

    function setCategory(cat) {
      currentCategory = cat;
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === cat);
      });
      loadProducts();
    }

    function clearFilters() {
      currentCategory = 'All';
      currentSearch = '';
      currentSort = '';
      document.getElementById('search-input').value = '';
      document.getElementById('sort-select').value = '';
      document.querySelectorAll('.filter-btn').forEach(btn => {
        btn.classList.toggle('active', btn.textContent === 'All');
      });
      loadProducts();
    }

    async function loadProducts() {
      const grid = document.getElementById('products-grid');
      const noResults = document.getElementById('no-results');
      const countEl = document.getElementById('products-count');

      grid.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:3rem;"><div class="spinner" style="margin:0 auto;"></div></div>';

      const { data: products } = await Products.getAll({
        category: currentCategory,
        search: currentSearch,
        sort: currentSort
      });

      if (!products || products.length === 0) {
        grid.innerHTML = '';
        noResults.style.display = 'block';
        countEl.textContent = '0 fragrances';
        return;
      }

      noResults.style.display = 'none';
      countEl.textContent = `${products.length} fragrance${products.length !== 1 ? 's' : ''}`;
      grid.innerHTML = products.map(p => productCardHTML(p)).join('');
      initScrollReveal();
    }
  </script>
</body>
</html>
