<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <title>Checkout — Scent Haven</title>
  <link rel="stylesheet" href="/assets/css/core.css">
  <link rel="stylesheet" href="/assets/css/pages.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="/assets/js/supabase.js"></script>
  <script src="/assets/js/db.js"></script>
  <script src="/assets/js/ui.js"></script>
  <link rel="manifest" href="/manifest.json">
  <meta name="theme-color" content="#C9A84C">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Scent Haven">
  <link rel="apple-touch-icon" href="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png">
</head>
<body>
  <div class="loading-overlay" id="loading-screen">
    <div class="spinner" style="width:36px;height:36px;border-width:2.5px;"></div>
    <div class="loading-logo"><img src="https://vudxovvqpjdhlemugtqh.supabase.co/storage/v1/object/public/assets/logo.png" alt="Scent Haven" style="height:60px;width:auto;"></div>
  </div>
  <canvas id="particles-canvas"></canvas>
  <nav class="navbar" id="navbar"></nav>

  <div class="page-body">
    <div class="page-hero">
      <span class="section-eyebrow">✦ Final Step</span>
      <h1 class="section-title">Check<em>out</em></h1>
    </div>

    <div class="container">
      <!-- Main checkout view -->
      <div class="checkout-layout" id="checkout-view">
        <div>
          <!-- Contact -->
          <div class="checkout-form-section">
            <h3 class="checkout-form-title">Contact Information</h3>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" class="form-input" id="co-name" placeholder="John Doe">
              </div>
              <div class="form-group">
                <label class="form-label">Phone Number</label>
                <input type="tel" class="form-input" id="co-phone" placeholder="+234...">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Email</label>
              <input type="email" class="form-input" id="co-email" placeholder="your@email.com">
            </div>
          </div>

          <!-- Delivery -->
          <div class="checkout-form-section">
            <h3 class="checkout-form-title">Delivery Address</h3>
            <div class="form-group">
              <label class="form-label">Street Address</label>
              <input type="text" class="form-input" id="co-street" placeholder="123 Main Street, Lekki">
            </div>
            <div class="form-row">
              <div class="form-group">
                <label class="form-label">City</label>
                <input type="text" class="form-input" id="co-city" placeholder="Lagos">
              </div>
              <div class="form-group">
                <label class="form-label">State</label>
                <input type="text" class="form-input" id="co-state" placeholder="Lagos">
              </div>
            </div>
            <div class="form-group">
              <label class="form-label">Additional Notes</label>
              <textarea class="form-textarea" id="co-notes" placeholder="Delivery instructions, landmarks, etc."></textarea>
            </div>
          </div>
        </div>

        <!-- Summary sidebar -->
        <div>
          <div class="cart-summary">
            <h3 class="cart-summary-title">Order Summary</h3>
            <div id="checkout-items"></div>
            <div id="checkout-totals"></div>
            <div style="margin-top:1.5rem;display:flex;flex-direction:column;gap:0.8rem;">
              <button class="btn btn-primary btn-block" onclick="placeOrder()">Place Order</button>
              <button class="btn btn-success btn-block" onclick="whatsappOrder()">💬 Confirm via WhatsApp</button>
            </div>
            <div style="margin-top:0.8rem;text-align:center;">
              <a href="/cart.html" style="font-size:0.72rem;color:var(--gold);">← Back to Cart</a>
            </div>
          </div>
        </div>
      </div>

      <!-- Confirmation view (hidden initially) -->
      <div id="order-confirmation" style="display:none;">
        <div class="empty-state" style="padding:5rem 2rem;">
          <div class="empty-state-icon">🎉</div>
          <div class="empty-state-title" style="font-size:2rem;">Order Placed!</div>
          <div class="empty-state-text" style="max-width:400px;margin:0.5rem auto 0;">Thank you for your order. We'll confirm it shortly via WhatsApp.</div>
          <div id="order-id" style="font-family:var(--font-display);font-size:1.2rem;color:var(--gold);margin:1rem 0;"></div>
          <div style="display:flex;gap:1rem;justify-content:center;flex-wrap:wrap;margin-top:1.5rem;">
            <a href="/shop.html" class="btn btn-outline">Continue Shopping</a>
            <a href="/profile.html" class="btn btn-primary">View Orders</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="site-footer" id="site-footer"></footer>

  <script>
    let cartData = [];
    let orderTotal = 0;

    document.addEventListener('DOMContentLoaded', async () => {
      await renderNavbar();

      cartData = await Cart.getCartWithProducts();
      if (!cartData.length) {
        window.location.href = '/cart.html';
        return;
      }

      // Pre-fill from user data
      const user = await Auth.getUser();
      if (user) {
        document.getElementById('co-name').value = user.full_name || '';
        document.getElementById('co-email').value = user.email || '';
        document.getElementById('co-phone').value = user.phone || '';
      }

      // Pre-fill address
      const addr = JSON.parse(localStorage.getItem('sh_address') || '{}');
      if (addr.street) document.getElementById('co-street').value = addr.street;
      if (addr.city) document.getElementById('co-city').value = addr.city;
      if (addr.state) document.getElementById('co-state').value = addr.state;

      renderCheckoutSummary();
    });

    function renderCheckoutSummary() {
      const itemsEl = document.getElementById('checkout-items');
      const totalsEl = document.getElementById('checkout-totals');

      let subtotal = 0;
      itemsEl.innerHTML = cartData.map(item => {
        const p = item.product;
        const lineTotal = p.price * item.quantity;
        subtotal += lineTotal;
        return `
          <div class="cart-summary-row" style="margin-bottom:0.8rem;">
            <span style="flex:1;">${p.name} <span style="color:var(--muted-dim);">×${item.quantity}</span></span>
            <span>${formatPrice(lineTotal)}</span>
          </div>
        `;
      }).join('');

      const delivery = subtotal > 100000 ? 0 : 3000;
      orderTotal = subtotal + delivery;

      totalsEl.innerHTML = `
        <div style="border-top:1px solid rgba(201,168,76,0.1);padding-top:0.8rem;margin-top:0.8rem;">
          <div class="cart-summary-row"><span>Subtotal</span><span>${formatPrice(subtotal)}</span></div>
          <div class="cart-summary-row"><span>Delivery</span><span>${delivery === 0 ? '<span style="color:var(--success);">Free</span>' : formatPrice(delivery)}</span></div>
        </div>
        <div class="cart-summary-total"><span>Total</span><span>${formatPrice(orderTotal)}</span></div>
      `;
    }

    async function placeOrder() {
      const name = document.getElementById('co-name').value.trim();
      const phone = document.getElementById('co-phone').value.trim();
      const email = document.getElementById('co-email').value.trim();
      const street = document.getElementById('co-street').value.trim();
      const city = document.getElementById('co-city').value.trim();

      if (!name) { showToast('Please enter your name', 'error'); return; }
      if (!phone) { showToast('Please enter your phone number', 'error'); return; }
      if (!street) { showToast('Please enter your delivery address', 'error'); return; }
      if (!city) { showToast('Please enter your city', 'error'); return; }

      const user = await Auth.getUser();

      const orderData = {
        user_id: (user && user.id) || 'guest',
        customer_name: name,
        customer_phone: phone,
        customer_email: email,
        delivery_address: `${street}, ${city}, ${document.getElementById('co-state').value.trim()}`,
        notes: document.getElementById('co-notes').value.trim(),
        total: orderTotal,
        items: cartData.map(item => ({
          product_id: item.product.id,
          name: item.product.name,
          brand: item.product.brand,
          price: item.product.price,
          quantity: item.quantity
        }))
      };

      const { data: order, error } = await Orders.create(orderData);
      if (error) {
        showToast('Failed to place order: ' + error.message, 'error');
        return;
      }

      // Clear cart
      await Cart.clear();
      updateCartCount();

      // Show confirmation
      document.getElementById('checkout-view').style.display = 'none';
      document.getElementById('order-confirmation').style.display = 'block';
      document.getElementById('order-id').textContent = `Order #${order.id}`;
    }

    function whatsappOrder() {
      const name = document.getElementById('co-name').value.trim() || 'Customer';
      const phone = document.getElementById('co-phone').value.trim();
      const address = `${document.getElementById('co-street').value.trim()}, ${document.getElementById('co-city').value.trim()}`;

      let msg = '🌹 *SCENT HAVEN ORDER* 🌹\n\n';
      msg += `👤 Name: ${name}\n`;
      if (phone) msg += `📞 Phone: ${phone}\n`;
      if (address.length > 2) msg += `📍 Address: ${address}\n`;
      msg += '\n';

      let total = 0;
      cartData.forEach(item => {
        const p = item.product;
        const lineTotal = p.price * item.quantity;
        total += lineTotal;
        msg += `• *${p.name}* (${p.brand})\n  Qty: ${item.quantity} | ₦${lineTotal.toLocaleString()}\n\n`;
      });

      msg += `━━━━━━━━━━━━\n💰 *TOTAL: ₦${total.toLocaleString()}*\n\nPlease confirm my order. Thank you! 🙏`;
      window.open('https://wa.me/2349033429640?text=' + encodeURIComponent(msg), '_blank');
    }
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
